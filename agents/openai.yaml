interface:
  display_name: "GitHub Publish & Update"
  short_description: "Publish a local project and push updates to GitHub"
  default_prompt: "Use $github-publish-update to check GitHub CLI login, guide me through authentication if needed, then publish this project to GitHub and push the latest updates."

dependencies:
  tools:
    - type: "mcp"
      value: "github"
      description: "GitHub MCP server for repository creation and remote verification"
      transport: "streamable_http"
      url: "https://api.githubcopilot.com/mcp/"

policy:
  allow_implicit_invocation: true
